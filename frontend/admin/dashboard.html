<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZZONA — Management Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #C9A96E;
  --gold-light: #E2C992;
  --gold-dim: rgba(201,169,110,0.15);
  --dark: #0A0A0A;
  --dark2: #111111;
  --dark3: #181818;
  --dark4: #1E1E1E;
  --border: rgba(201,169,110,0.12);
  --text: #8A8276;
  --cream: #E8E0D0;
  --red: #C0392B;
  --green: #27AE60;
  --amber: #E67E22;
}
html, body, #root { height: 100%; }
body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Syne', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
input, select, textarea, button { font-family: 'Syne', sans-serif; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Responsive layout classes ── */
.pg { padding: 36px 40px; overflow-y: auto; flex: 1; position: relative; }
.pg-hd { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; }
.pg-btns { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.sg3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 36px; }
.s2a { display: grid; grid-template-columns: 1fr 280px; gap: 24px; }
.s2b { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.lbx { position: relative; width: 480px; background: rgba(17,17,17,0.95); border: 1px solid var(--border); padding: 56px 48px; backdrop-filter: blur(20px); }
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border); }
.tbl-hd { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr 1.2fr; padding: 12px 24px; border-bottom: 1px solid var(--border); min-width: 580px; }
.tbl-row { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr 1.2fr; padding: 18px 24px; align-items: center; transition: background 0.2s; min-width: 580px; }
.djt-hd { display: grid; grid-template-columns: 100px 1fr 1fr 1fr 120px; padding: 12px 24px; border-bottom: 1px solid var(--border); min-width: 540px; }
.djt-row { display: grid; grid-template-columns: 100px 1fr 1fr 1fr 120px; padding: 18px 24px; align-items: center; min-width: 540px; }

@media (max-width: 960px) {
  .s2a, .s2b { grid-template-columns: 1fr; }
  .sg3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 640px) {
  .pg { padding: 20px 16px; }
  .pg-hd { flex-direction: column; gap: 14px; }
  .sg3 { grid-template-columns: 1fr; }
  .f2 { grid-template-columns: 1fr; }
  .lbx { width: calc(100vw - 32px); padding: 36px 20px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── API ───────────────────────────────────────────────────────
const BASE = '';

function getToken() { return sessionStorage.getItem('azzona_token'); }
function setToken(t) { sessionStorage.setItem('azzona_token', t); }
function clearToken() { sessionStorage.removeItem('azzona_token'); }

async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  const token = getToken();
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(data.message || data.error || 'Erro'), { status: res.status, data });
  return data;
}

// ── UTILS ─────────────────────────────────────────────────────
const statusColor = s => ({
  confirmed: 'var(--green)',
  pending: 'var(--amber)',
  cancelled: 'var(--red)',
}[s] || 'var(--text)');

const statusLabel = s => ({ confirmed:'Confirmada', pending:'Pendente', cancelled:'Cancelada' }[s] || s);

const statusDot = s => (
  <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:statusColor(s),marginRight:6}}></span>
);

function today() { return new Date().toISOString().split('T')[0]; }

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function Spinner({ size = 14, color = 'var(--dark)' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 14 14" style={{animation:'spin 1s linear infinite'}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <circle cx="7" cy="7" r="5" fill="none" stroke={color} strokeWidth="2" strokeDasharray="20" strokeDashoffset="10"/>
    </svg>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async e => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      const { token } = await api('POST', '/api/admin/login', { username: user, password: pass });
      setToken(token);
      onLogin();
    } catch (err) {
      if (err.status === 429) {
        setError('Demasiadas tentativas. Aguarde 15 minutos.');
      } else {
        setError('Credenciais inválidas.');
      }
      setPass('');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:'100vh', background:'var(--dark)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden', padding:'16px'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.03) 0%, transparent 50%)'}}></div>
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px)',backgroundSize:'60px 60px',opacity:0.5}}></div>

      <div className="lbx">
        <div style={{textAlign:'center', marginBottom:40}}>
          <svg width="32" height="32" viewBox="0 0 32 32" style={{marginBottom:16}}>
            <line x1="8" y1="8" x2="24" y2="24" stroke="var(--gold)" strokeWidth="2"/>
            <line x1="24" y1="8" x2="8" y2="24" stroke="var(--gold)" strokeWidth="2"/>
            <circle cx="16" cy="16" r="4" fill="none" stroke="var(--gold)" strokeWidth="1.5"/>
          </svg>
          <div style={{fontFamily:'Playfair Display, serif', fontSize:32, fontWeight:700, letterSpacing:8, color:'var(--gold)'}}>AZZONA</div>
          <div style={{fontSize:10, letterSpacing:5, color:'var(--text)', textTransform:'uppercase', marginTop:8}}>Management Portal</div>
        </div>

        <form onSubmit={submit}>
          <div style={{marginBottom:24}}>
            <label style={{fontSize:10, letterSpacing:3, textTransform:'uppercase', color:'var(--text)', display:'block', marginBottom:10}}>Administrator ID</label>
            <input value={user} onChange={e=>setUser(e.target.value)} placeholder="Enter credentials" autoComplete="username"
              style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid rgba(201,169,110,0.25)', padding:'10px 0', color:'var(--cream)', fontSize:15, outline:'none', transition:'border-color 0.3s'}}
              onFocus={e=>e.target.style.borderBottomColor='var(--gold)'} onBlur={e=>e.target.style.borderBottomColor='rgba(201,169,110,0.25)'}/>
          </div>
          <div style={{marginBottom:32, position:'relative'}}>
            <label style={{fontSize:10, letterSpacing:3, textTransform:'uppercase', color:'var(--text)', display:'block', marginBottom:10}}>Access Cipher</label>
            <input type={showPass?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" autoComplete="current-password"
              style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid rgba(201,169,110,0.25)', padding:'10px 0', paddingRight:32, color:'var(--cream)', fontSize:15, outline:'none', transition:'border-color 0.3s'}}
              onFocus={e=>e.target.style.borderBottomColor='var(--gold)'} onBlur={e=>e.target.style.borderBottomColor='rgba(201,169,110,0.25)'}/>
            <button type="button" onClick={()=>setShowPass(s=>!s)} style={{position:'absolute', right:0, bottom:10, background:'none', border:'none', color:'var(--text)', cursor:'pointer', fontSize:14}}>
              {showPass ? '🙈' : '👁'}
            </button>
          </div>

          {error && <div style={{marginBottom:20, padding:'10px 14px', background:'rgba(192,57,43,0.12)', border:'1px solid rgba(192,57,43,0.3)', fontSize:12, color:'#e74c3c', letterSpacing:1}}>{error}</div>}

          <button type="submit" disabled={loading} style={{width:'100%', background:loading?'rgba(201,169,110,0.5)':'var(--gold)', border:'none', color:'var(--dark)', padding:'16px', fontSize:11, letterSpacing:4, textTransform:'uppercase', fontWeight:700, cursor:loading?'wait':'pointer', transition:'all 0.3s', display:'flex', alignItems:'center', justifyContent:'center', gap:10}}>
            {loading ? <><Spinner/> Autenticando...</> : <>AUTHENTICATE →</>}
          </button>
        </form>

        <div style={{textAlign:'center', marginTop:40, fontSize:10, letterSpacing:3, color:'rgba(138,130,118,0.4)', textTransform:'uppercase'}}>
          © 2026 Azzona · Polana District · Secure Server
        </div>
      </div>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard', icon:'⊞' },
  { id:'reservations', label:'Reservas', icon:'◫' },
  { id:'djs', label:'DJ & Events', icon:'◉' },
];

function Sidebar({ active, setActive, onLogout, haltDay, isOpen, onClose }) {
  const go = id => { setActive(id); onClose(); };
  return (
    <>
      {isOpen && (
        <div onClick={onClose} style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.6)',
          zIndex:998, backdropFilter:'blur(2px)',
        }}/>
      )}
      <div style={{
        width:220, background:'var(--dark2)', borderRight:'1px solid var(--border)',
        display:'flex', flexDirection:'column', flexShrink:0, height:'100%',
        position:'fixed', top:0, left:0, bottom:0, zIndex:999,
        transform: isOpen ? 'translateX(0)' : 'translateX(-100%)',
        transition:'transform 0.3s cubic-bezier(.16,1,.3,1)',
      }}>
        <div style={{padding:'28px 24px 16px', display:'flex', alignItems:'flex-start', justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:'Playfair Display,serif', fontSize:18, fontWeight:700, letterSpacing:4, color:'var(--gold)'}}>AZZONA</div>
            <div style={{fontSize:9, letterSpacing:3, color:'var(--text)', textTransform:'uppercase', marginTop:4}}>Polana District Admin</div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text)', cursor:'pointer', fontSize:18, lineHeight:1, padding:'2px 4px'}}>✕</button>
        </div>
        <div style={{borderTop:'1px solid var(--border)', margin:'0 16px'}}></div>
        <nav style={{padding:'16px 0', flex:1}}>
          {NAV.map(n => (
            <button key={n.id} onClick={()=>go(n.id)} style={{
              display:'flex', alignItems:'center', gap:12, width:'100%',
              padding:'13px 24px', background:active===n.id?'rgba(201,169,110,0.08)':'transparent',
              border:'none', borderLeft:active===n.id?'2px solid var(--gold)':'2px solid transparent',
              color:active===n.id?'var(--gold)':'var(--text)', fontSize:11,
              letterSpacing:2, textTransform:'uppercase', cursor:'pointer', transition:'all 0.2s', textAlign:'left',
            }}>
              <span style={{fontSize:14, opacity:active===n.id?1:0.5}}>{n.icon}</span>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{borderTop:'1px solid var(--border)', padding:'12px 8px'}}>
          <a href="/" style={{display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 16px', background:'transparent', border:'none', color:'var(--gold)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer', textDecoration:'none'}}>
            <span>←</span> Ver Site
          </a>
          <button onClick={onLogout} style={{display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 16px', background:'transparent', border:'none', color:'var(--text)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>
            <span>↩</span> Logout
          </button>
        </div>
      </div>
    </>
  );
}

// ── TOPBAR ────────────────────────────────────────────────────
function Topbar({ title, haltDay, onMenuToggle }) {
  return (
    <div style={{height:56, background:'var(--dark2)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 20px', gap:12, flexShrink:0}}>
      <button onClick={onMenuToggle} style={{background:'none', border:'none', cursor:'pointer', padding:'6px', display:'flex', flexDirection:'column', gap:5, flexShrink:0}}>
        <span style={{display:'block', width:20, height:1.5, background:'var(--gold)', borderRadius:2}}></span>
        <span style={{display:'block', width:14, height:1.5, background:'var(--gold)', borderRadius:2}}></span>
        <span style={{display:'block', width:20, height:1.5, background:'var(--gold)', borderRadius:2}}></span>
      </button>
      <div style={{flex:1, minWidth:0}}>
        <div style={{color:'var(--gold)', fontSize:13, letterSpacing:2, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{title}</div>
      </div>
      <div style={{display:'flex', alignItems:'center', gap:12, flexShrink:0}}>
        {haltDay && <span style={{fontSize:9, letterSpacing:2, color:'var(--red)', textTransform:'uppercase', background:'rgba(192,57,43,0.1)', padding:'4px 8px', border:'1px solid rgba(192,57,43,0.3)', whiteSpace:'nowrap'}}>◉ FECHADO</span>}
        <div style={{width:32, height:32, background:'var(--gold-dim)', border:'1px solid var(--border)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, color:'var(--gold)', flexShrink:0}}>A</div>
      </div>
    </div>
  );
}

// ── DASHBOARD (TODAY) ─────────────────────────────────────────
function Dashboard({ settings, onSettingsChange }) {
  const [data, setData] = useState({ reservations: [], total: 0, totalGuests: 0 });
  const [loading, setLoading] = useState(true);
  const [showAbsence, setShowAbsence] = useState(false);
  const [absenceMsg, setAbsenceMsg] = useState(settings.absence_message || '');
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState('');

  const load = useCallback(async () => {
    try {
      setLoading(true);
      const res = await api('GET', '/api/admin/reservations/today');
      setData(res);
    } catch (e) {
      console.error(e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const updateStatus = async (id, status) => {
    try {
      await api('PUT', `/api/admin/reservations/${id}`, { status });
      await load();
      showToast(status === 'confirmed' ? 'Reserva confirmada' : 'Reserva cancelada');
    } catch (e) {
      showToast('Erro ao actualizar', true);
    }
  };

  const toggleClose = async () => {
    const newVal = !settings.booking_closed;
    setSaving(true);
    try {
      await api('PUT', '/api/admin/settings/booking_closed', { value: newVal });
      onSettingsChange({ ...settings, booking_closed: newVal });
      showToast(newVal ? 'Reservas fechadas' : 'Reservas abertas');
    } catch (e) {
      showToast('Erro ao guardar', true);
    } finally {
      setSaving(false);
    }
  };

  const saveAbsence = async () => {
    setSaving(true);
    try {
      await api('PUT', '/api/admin/settings/absence_message', { value: absenceMsg });
      onSettingsChange({ ...settings, absence_message: absenceMsg });
      setShowAbsence(false);
      showToast('Mensagem publicada');
    } catch (e) {
      showToast('Erro ao guardar', true);
    } finally {
      setSaving(false);
    }
  };

  const showToast = (msg, err = false) => {
    setToast({ msg, err });
    setTimeout(() => setToast(''), 3000);
  };

  const dateLabel = new Date().toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long' });

  return (
    <div className="pg">
      {toast && (
        <div style={{position:'fixed', top:20, right:20, zIndex:999, padding:'12px 20px', background:toast.err?'rgba(192,57,43,0.9)':'rgba(39,174,96,0.9)', border:`1px solid ${toast.err?'var(--red)':'var(--green)'}`, fontSize:12, letterSpacing:1, color:'white', backdropFilter:'blur(8px)'}}>
          {toast.err ? '✕' : '✓'} {toast.msg}
        </div>
      )}

      <div className="pg-hd">
        <div>
          <div style={{fontSize:11, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:6}}>{dateLabel}</div>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:40, fontWeight:400}}>Daily Overview</div>
        </div>
        <div className="pg-btns">
          <button onClick={()=>setShowAbsence(s=>!s)} style={{padding:'10px 20px', background:'transparent', border:'1px solid var(--border)', color:'var(--cream)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:8}}>
            💬 Mensagem de Ausência
          </button>
          <button onClick={toggleClose} disabled={saving} style={{padding:'10px 20px', background:settings.booking_closed?'rgba(192,57,43,0.2)':'var(--gold-dim)', border:`1px solid ${settings.booking_closed?'rgba(192,57,43,0.4)':'var(--border)'}`, color:settings.booking_closed?'var(--red)':'var(--gold)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:8}}>
            🔒 {settings.booking_closed ? 'Abrir Reservas' : 'Fechar o Dia'}
          </button>
        </div>
      </div>

      {showAbsence && (
        <div style={{marginBottom:24, padding:'20px 24px', background:'var(--dark3)', border:'1px solid var(--border)'}}>
          <div style={{fontSize:10, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:10}}>Mensagem de Ausência (aparece no site público)</div>
          <textarea value={absenceMsg} onChange={e=>setAbsenceMsg(e.target.value)} rows={2}
            style={{width:'100%', background:'transparent', border:'1px solid var(--border)', color:'var(--cream)', padding:'10px', fontSize:14, resize:'none', outline:'none'}}
            placeholder="Ex: Hoje estamos com evento privado. Aceitamos reservas apenas para amanhã."/>
          <div style={{display:'flex', gap:10, marginTop:10}}>
            <button onClick={saveAbsence} disabled={saving} style={{padding:'8px 20px', background:'var(--gold)', border:'none', color:'var(--dark)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>
              {saving ? 'A guardar...' : 'Publicar'}
            </button>
            <button onClick={()=>setShowAbsence(false)} style={{padding:'8px 20px', background:'transparent', border:'1px solid var(--border)', color:'var(--text)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      <div className="sg3">
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'28px 28px 24px'}}>
          <div style={{fontSize:11, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:16}}>Reservas para Hoje</div>
          <div style={{display:'flex', alignItems:'flex-end', gap:14}}>
            <div style={{fontFamily:'Playfair Display,serif', fontSize:60, fontWeight:400, lineHeight:1, color:'var(--cream)'}}>{loading ? '—' : data.total}</div>
            <span style={{marginBottom:10, padding:'3px 10px', background:'var(--gold-dim)', fontSize:10, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase'}}>Hoje</span>
          </div>
        </div>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'28px 28px 24px'}}>
          <div style={{fontSize:11, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:16}}>Total de Pessoas Esperadas</div>
          <div style={{display:'flex', alignItems:'flex-end', gap:12}}>
            <div style={{fontFamily:'Playfair Display,serif', fontSize:60, fontWeight:400, lineHeight:1, color:'var(--cream)'}}>{loading ? '—' : data.totalGuests}</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11, color:'var(--text)'}}>Capacidade:</div>
              <div style={{fontSize:20, color:'var(--gold)'}}>65</div>
            </div>
          </div>
        </div>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'28px 28px 24px'}}>
          <div style={{fontSize:11, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:16}}>Pendentes de Confirmação</div>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:60, fontWeight:400, lineHeight:1, color:'var(--amber)'}}>
            {loading ? '—' : data.reservations.filter(r=>r.status==='pending').length}
          </div>
        </div>
      </div>

      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20, flexWrap:'wrap', gap:12}}>
        <div style={{fontFamily:'Playfair Display,serif', fontSize:28, fontWeight:400}}>Today's Roster</div>
        <button onClick={load} style={{padding:'6px 14px', background:'transparent', border:'1px solid var(--border)', color:'var(--text)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>↺ Actualizar</button>
      </div>

      {loading ? (

                <div style={{fontSize:13, color:'var(--text)'}}>{r.customer_phone}</div>
                <div>
                  <div style={{fontSize:16, color:'var(--gold)', fontWeight:600}}>{r.time}</div>
                  <div style={{fontSize:11, color:'var(--text)'}}>{r.guests} pessoas</div>

                <div style={{display:'flex', alignItems:'center', fontSize:12}}>

                    <button onClick={()=>updateStatus(r.id,'confirmed')} style={{padding:'5px 12px', background:'rgba(39,174,96,0.1)', border:'1px solid rgba(39,174,96,0.3)', color:'var(--green)', fontSize:10, letterSpacing:1, cursor:'pointer'}}>✓</button>
                  )}
                  {r.status !== 'cancelled' && (
                    <button onClick={()=>updateStatus(r.id,'cancelled')} style={{padding:'5px 12px', background:'rgba(192,57,43,0.1)', border:'1px solid rgba(192,57,43,0.3)', color:'var(--red)', fontSize:10, letterSpacing:1, cursor:'pointer'}}>✕</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── RESERVATIONS ──────────────────────────────────────────────
function Reservations() {
  const [selectedDate, setSelectedDate] = useState(today());
  const [reservations, setReservations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState('all');
  const [toast, setToast] = useState('');

  const load = useCallback(async (date) => {
    setLoading(true);
    try {
      const res = await api('GET', `/api/admin/reservations?date=${date}`);
      setReservations(res);
    } catch (e) {
      console.error(e);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(selectedDate); }, [selectedDate, load]);

  const updateStatus = async (id, status) => {
    try {
      await api('PUT', `/api/admin/reservations/${id}`, { status });
      await load(selectedDate);
      setToast(status === 'confirmed' ? 'Confirmada' : 'Cancelada');
      setTimeout(() => setToast(''), 2500);
    } catch (e) {
      console.error(e);
    }
  };

  const filtered = reservations.filter(r => filter === 'all' || r.status === filter);
  const totalGuests = reservations.reduce((s,r) => s + r.guests, 0);
  const pending = reservations.filter(r => r.status === 'pending').length;

  const weekDays = Array.from({length:7}, (_,i) => {
    const d = new Date();
    d.setDate(d.getDate() + i);
    return d.toISOString().split('T')[0];
  });

  const dayLabel = d => {
    const date = new Date(d + 'T12:00:00');
    return date.toLocaleDateString('pt-PT', { weekday:'short', day:'numeric' });
  };

  return (
    <div className="pg">
      {toast && (
        <div style={{position:'fixed', top:20, right:20, zIndex:999, padding:'12px 20px', background:'rgba(39,174,96,0.9)', border:'1px solid var(--green)', fontSize:12, color:'white', backdropFilter:'blur(8px)'}}>
          ✓ {toast}
        </div>
      )}

      <div className="pg-hd" style={{marginBottom:24}}>
        <div>
          <div style={{fontSize:11, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:6}}>Schedule Management</div>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:40}}>Reservations</div>
        </div>
        <div style={{marginTop:8}}>
          <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}
            style={{background:'transparent', border:'1px solid var(--border)', padding:'8px 12px', color:'var(--cream)', fontSize:12, outline:'none', colorScheme:'dark', cursor:'pointer'}}/>
        </div>
      </div>

      <div style={{display:'flex', gap:0, marginBottom:24, overflowX:'auto'}}>
        {weekDays.map((d,i) => (
          <button key={d} onClick={()=>setSelectedDate(d)} style={{
            padding:'10px 16px', background:'transparent',
            border:'1px solid var(--border)', borderLeft:i>0?'none':'1px solid var(--border)',
            color:selectedDate===d?'var(--gold)':'var(--text)',
            fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer',
            minWidth:80, position:'relative', whiteSpace:'nowrap', flexShrink:0,
          }}>
            {dayLabel(d)}
            {selectedDate===d && <div style={{position:'absolute', bottom:0, left:0, right:0, height:2, background:'var(--gold)'}}></div>}
          </button>
        ))}
      </div>

      <div className="s2a">
        <div>
          {loading ? (
            <div style={{padding:'60px', display:'flex', justifyContent:'center', border:'1px solid var(--border)'}}>
              <Spinner size={24} color="var(--gold)"/>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{padding:'60px', textAlign:'center', color:'var(--text)', fontSize:14, border:'1px solid var(--border)', letterSpacing:2}}>
              Sem reservas para {fmtDate(selectedDate)}
            </div>
          ) : filtered.map(r => (
            <div key={r.id} style={{background:'var(--dark3)', border:`1px solid ${r.status==='pending'?'rgba(230,126,34,0.3)':'var(--border)'}`, padding:'20px', marginBottom:16, position:'relative'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12}}>
                <div style={{minWidth:0}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8, flexWrap:'wrap'}}>
                    <span style={{fontSize:11, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase'}}>{r.time}</span>
                    <span style={{padding:'3px 10px', background:r.status==='pending'?'rgba(230,126,34,0.1)':'rgba(39,174,96,0.1)', border:`1px solid ${r.status==='pending'?'rgba(230,126,34,0.3)':'rgba(39,174,96,0.3)'}`, fontSize:9, letterSpacing:2, color:r.status==='pending'?'var(--amber)':'var(--green)', textTransform:'uppercase', whiteSpace:'nowrap'}}>● {statusLabel(r.status)}</span>
                  </div>
                  <div style={{fontFamily:'Playfair Display,serif', fontSize:20, marginBottom:4}}>{r.customer_name}</div>
                  <div style={{fontSize:12, color:'var(--text)'}}>{r.customer_phone} · {r.guests} pessoas</div>
                  {r.notes && <div style={{marginTop:8, fontSize:12, color:'var(--text)', fontStyle:'italic', borderLeft:'2px solid var(--gold-dim)', paddingLeft:10}}>{r.notes}</div>}
                </div>
                {r.status !== 'cancelled' && (
                  <div style={{display:'flex', flexDirection:'column', gap:8, marginTop:4, flexShrink:0}}>
                    {r.status==='pending' && (
                      <button onClick={()=>updateStatus(r.id,'confirmed')} style={{padding:'8px 16px', background:'transparent', border:'1px solid rgba(39,174,96,0.4)', color:'var(--green)', fontSize:10, letterSpacing:2, cursor:'pointer', whiteSpace:'nowrap'}}>✓ Confirmar</button>
                    )}
                    <button onClick={()=>updateStatus(r.id,'cancelled')} style={{padding:'8px 16px', background:'transparent', border:'1px solid rgba(201,169,110,0.2)', color:'var(--text)', fontSize:10, letterSpacing:2, cursor:'pointer', whiteSpace:'nowrap'}}>✕ Cancelar</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        <div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16}}>
            <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'20px', textAlign:'center'}}>
              <div style={{fontSize:36, color:'var(--cream)', fontFamily:'Playfair Display,serif'}}>{totalGuests}</div>
              <div style={{fontSize:9, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginTop:4}}>Pessoas</div>
            </div>
            <div style={{background:'var(--dark3)', border:'1px solid rgba(201,169,110,0.3)', padding:'20px', textAlign:'center'}}>
              <div style={{fontSize:36, color:'var(--gold)', fontFamily:'Playfair Display,serif'}}>{pending}</div>
              <div style={{fontSize:9, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase', marginTop:4}}>Pendentes</div>
            </div>
          </div>

          <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'20px', marginBottom:16}}>
            <div style={{fontSize:11, letterSpacing:2, color:'var(--cream)', textTransform:'uppercase', marginBottom:16}}>⚌ Filtrar</div>
            {[['all','Todas'], ['confirmed','Confirmadas'], ['pending','Pendentes'], ['cancelled','Canceladas']].map(([f,label])=>(
              <label key={f} style={{display:'flex', alignItems:'center', gap:10, marginBottom:10, cursor:'pointer', fontSize:13, color:filter===f?'var(--cream)':'var(--text)'}}>
                <input type="radio" name="filter" checked={filter===f} onChange={()=>setFilter(f)} style={{accentColor:'var(--gold)'}}/>
                {label}
              </label>
            ))}
          </div>

          <div style={{overflow:'hidden', position:'relative', height:140, border:'1px solid var(--border)'}}>
            <img src="/img/484471297_1258320312672407_7533519604146987578_n.jpg" style={{width:'100%', height:'100%', objectFit:'cover', opacity:0.5}} alt="venue"/>
            <div style={{position:'absolute', bottom:0, left:0, right:0, padding:'12px 16px', background:'linear-gradient(to top, rgba(10,10,10,0.9), transparent)'}}>
              <div style={{fontFamily:'Playfair Display,serif', fontSize:14, marginTop:2}}>Azzona · Maputo</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── DJ MANAGER ────────────────────────────────────────────────
function DJManager({ settings, onSettingsChange }) {
  const [djs, setDjs] = useState([
    { id:1, name:'Black Coffee', genre:'Deep Afro House', date:'2026-04-25', time:'22:00', status:'Published' },
    { id:2, name:'Peggy Gou', genre:'Lounge / Tech House', date:'2026-05-02', time:'22:00', status:'Draft' },
    { id:3, name:'DJ Merlon', genre:'Soulful House', date:'2026-05-09', time:'22:00', status:'Published' },
  ]);
  const [form, setForm] = useState({ name:'', genre:'', date:'', time:'22:00' });
  const [imgPreview, setImgPreview] = useState(null);
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const [absenceMsg, setAbsenceMsg] = useState(settings.absence_message || '');
  const [spotifyInput, setSpotifyInput] = useState(settings.spotify_embed_url || '');
  const [spotifyToast, setSpotifyToast] = useState('');
  const fileRef = useRef();

  function toEmbedUrl(raw) {
    try {
      const url = new URL(raw.trim().replace(/\\$/, ''));
      if (!url.hostname.includes('spotify.com')) return null;
      const path = url.pathname
        .replace('/embed', '')
        .replace(/^\/intl-[a-z-]+/, '')
        .replace(/^\//, '');
      return `https://open.spotify.com/embed/${path}?utm_source=generator&theme=0&autoplay=1`;
    } catch { return null; }
  }

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert('Máximo 5MB'); return; }
    const reader = new FileReader();
    reader.onload = ev => setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const schedule = () => {
    if (!form.name || !form.date) return;
    setDjs(d => [{ id: Date.now(), ...form, status:'Draft', img:imgPreview }, ...d]);
    setForm({ name:'', genre:'', date:'', time:'22:00' });
    setImgPreview(null);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const publish = id => setDjs(d => d.map(dj => dj.id===id ? {...dj, status:'Published'} : dj));
  const remove = id => setDjs(d => d.filter(dj => dj.id!==id));

  const toggleClose = async () => {
    const newVal = !settings.booking_closed;
    setSaving(true);
    try {
      await api('PUT', '/api/admin/settings/booking_closed', { value: newVal });
      onSettingsChange({ ...settings, booking_closed: newVal });
    } catch (e) { console.error(e); }
    finally { setSaving(false); }
  };

  const saveAbsence = async () => {
    setSaving(true);
    try {
      await api('PUT', '/api/admin/settings/absence_message', { value: absenceMsg });
      onSettingsChange({ ...settings, absence_message: absenceMsg });
    } catch (e) { console.error(e); }
    finally { setSaving(false); }
  };

  const saveSpotify = async () => {
    const embedUrl = toEmbedUrl(spotifyInput) || spotifyInput;
    setSaving(true);
    try {
      await api('PUT', '/api/admin/settings/spotify_embed_url', { value: embedUrl });
      onSettingsChange({ ...settings, spotify_embed_url: embedUrl });
      setSpotifyToast('✓ Playlist actualizada no site');
      setTimeout(() => setSpotifyToast(''), 3000);
    } catch (e) { console.error(e); }
    finally { setSaving(false); }
  };

  return (
    <div className="pg">
      <div style={{marginBottom:32}}>
        <div style={{fontSize:11, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:6}}>Gestão de Noites</div>
        <div style={{fontFamily:'Playfair Display,serif', fontSize:40}}>DJ & Events</div>
        <div style={{fontSize:15, color:'var(--text)', marginTop:8, fontFamily:'Cormorant Garamond,serif', fontStyle:'italic'}}>Schedule talent and curate the atmospheric soundscape for upcoming nights.</div>
      </div>

      <div className="s2b">
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'28px'}}>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:22, marginBottom:28}}>Schedule New Event</div>
          <div className="f2">
            <div>
              <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:8}}>DJ / Artist Name</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Black Coffee"
                style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid var(--border)', padding:'10px 0', color:'var(--cream)', fontSize:14, outline:'none'}}/>
            </div>
            <div>
              <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:8}}>Event Date</label>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid var(--border)', padding:'10px 0', color:'var(--cream)', fontSize:14, outline:'none', colorScheme:'dark'}}/>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:8}}>Genre / Atmosphere</label>
            <input value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} placeholder="e.g. Deep Afro House"
              style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid var(--border)', padding:'10px 0', color:'var(--cream)', fontSize:14, outline:'none'}}/>
          </div>
          <div style={{marginBottom:24}}>
            <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:12}}>Promotional Image</label>
            <div onClick={()=>fileRef.current.click()} style={{border:'1px dashed rgba(201,169,110,0.3)', padding:'28px 20px', textAlign:'center', cursor:'pointer', transition:'border-color 0.3s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--gold)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(201,169,110,0.3)'}>
              {imgPreview
                ? <img src={imgPreview} style={{maxHeight:140, maxWidth:'100%', objectFit:'contain'}} alt="preview"/>
                : <>
                    <div style={{fontSize:28, marginBottom:10, color:'var(--gold)', opacity:0.5}}>↑</div>
                    <div style={{fontSize:13}}><span style={{color:'var(--gold)'}}>Click to upload</span> · PNG, JPG (max 5MB)</div>
                  </>}
            </div>
            <input ref={fileRef} type="file" accept="image/png,image/jpeg" onChange={handleFile} style={{display:'none'}}/>
          </div>
          {saved && <div style={{marginBottom:16, padding:'10px 14px', background:'rgba(39,174,96,0.1)', border:'1px solid rgba(39,174,96,0.3)', fontSize:12, color:'var(--green)', letterSpacing:1}}>✓ DJ agendado</div>}
          <button onClick={schedule} style={{padding:'14px 36px', background:'transparent', border:'1px solid var(--gold)', color:'var(--gold)', fontSize:11, letterSpacing:3, textTransform:'uppercase', cursor:'pointer', transition:'all 0.3s'}}
            onMouseEnter={e=>{e.target.style.background='var(--gold)';e.target.style.color='var(--dark)'}}
            onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color='var(--gold)'}}>
            Schedule Event
          </button>
        </div>

        <div>
          <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'20px', marginBottom:16}}>
            <div style={{fontSize:11, letterSpacing:2, color:'var(--cream)', textTransform:'uppercase', marginBottom:16}}>⚡ Quick Actions</div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 0', borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:12, color:settings.booking_closed?'var(--red)':'var(--text)'}}>Fechar Reservas</span>
              <div onClick={toggleClose} style={{width:40, height:22, background:settings.booking_closed?'var(--red)':'rgba(255,255,255,0.1)', borderRadius:11, position:'relative', cursor:'pointer', transition:'background 0.3s'}}>
                <div style={{width:16, height:16, background:'white', borderRadius:'50%', position:'absolute', top:3, left:settings.booking_closed?21:3, transition:'left 0.3s'}}></div>

            </div>
            <div style={{paddingTop:12, borderBottom:'1px solid var(--border)', paddingBottom:12}}>
              <div style={{fontSize:10, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:8}}>Mensagem de Ausência</div>
              <textarea value={absenceMsg} onChange={e=>setAbsenceMsg(e.target.value)} rows={2}
                style={{width:'100%', background:'transparent', border:'1px solid var(--border)', color:'var(--cream)', padding:'8px', fontSize:12, resize:'none', outline:'none'}}

              <button onClick={saveAbsence} disabled={saving} style={{marginTop:8, padding:'6px 16px', background:'var(--gold-dim)', border:'1px solid var(--border)', color:'var(--gold)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>

                <div style={{fontSize:10, letterSpacing:2, color:'var(--text)', textTransform:'uppercase'}}>Spotify — Site Público</div>

          <div style={{overflow:'hidden', border:'1px solid var(--border)', height:160, position:'relative'}}>
            <img src="/img/467157185_18289906990234146_9164660595181843240_n.jpg" style={{width:'100%', height:'100%', objectFit:'cover', opacity:0.5}} alt="venue"/>
            <div style={{position:'absolute', inset:0, background:'linear-gradient(to top, rgba(10,10,10,0.8), transparent)', display:'flex', alignItems:'flex-end', padding:'16px'}}>
              <div style={{fontFamily:'Playfair Display,serif', fontSize:16}}>Azzona · Polana</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{marginTop:40}}>
        <div style={{fontFamily:'Playfair Display,serif', fontSize:28, marginBottom:20}}>Scheduled Talent</div>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', overflow:'hidden'}}>
          <div className="tbl-wrap">
            <div className="djt-hd">
              {['Data','DJ / Artist','Género','Status',''].map(h=>(
                <div key={h} style={{fontSize:9, letterSpacing:2, color:'var(--text)', textTransform:'uppercase'}}>{h}</div>
              ))}
            </div>
            {djs.map((dj,i)=>(
              <div key={dj.id} className="djt-row"
                style={{borderBottom:i<djs.length-1?'1px solid rgba(201,169,110,0.05)':'none'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(201,169,110,0.03)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{fontSize:11, letterSpacing:1, color:'var(--gold)', textTransform:'uppercase'}}>{fmtDate(dj.date)}</div>
                <div style={{fontFamily:'Playfair Display,serif', fontSize:17}}>{dj.name}</div>
                <div style={{fontSize:12, color:'var(--text)'}}>{dj.genre}</div>
                <div style={{display:'flex', alignItems:'center', fontSize:12}}>
                  <span style={{display:'inline-block', width:7, height:7, borderRadius:'50%', background:dj.status==='Published'?'var(--green)':'var(--text)', marginRight:6}}></span>
                  {dj.status}
                </div>
                <div style={{display:'flex', gap:8}}>
                  {dj.status==='Draft' && <button onClick={()=>publish(dj.id)} style={{padding:'5px 12px', background:'rgba(39,174,96,0.1)', border:'1px solid rgba(39,174,96,0.3)', color:'var(--green)', fontSize:9, letterSpacing:1, cursor:'pointer'}}>Publish</button>}
                  <button onClick={()=>remove(dj.id)} style={{padding:'5px 12px', background:'transparent', border:'1px solid var(--border)', color:'var(--text)', fontSize:9, letterSpacing:1, cursor:'pointer'}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(() => !!sessionStorage.getItem('azzona_token'));
  const [screen, setScreen] = useState('dashboard');
  const [settings, setSettings] = useState({ booking_closed: false, absence_message: '' });
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => {
    if (authed) {
      api('GET', '/api/admin/settings').then(setSettings).catch(() => {});
    }
  }, [authed]);

  const login = () => setAuthed(true);
  const logout = () => { clearToken(); setAuthed(false); };

  const screenTitles = { dashboard:'Management Portal', reservations:'Reservas', djs:'DJ & Events' };

  if (!authed) return <Login onLogin={login}/>;

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      <Sidebar
        active={screen}
        setActive={setScreen}
        onLogout={logout}
        haltDay={settings.booking_closed}
        isOpen={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
      />
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', width:'100%'}}>
        <Topbar
          title={screenTitles[screen]}
          haltDay={settings.booking_closed}
          onMenuToggle={() => setSidebarOpen(o => !o)}
        />
        <div style={{flex:1, overflowY:'auto', background:'var(--dark)'}}>
          {screen==='dashboard' && <Dashboard settings={settings} onSettingsChange={setSettings}/>}
          {screen==='reservations' && <Reservations/>}
          {screen==='djs' && <DJManager settings={settings} onSettingsChange={setSettings}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
