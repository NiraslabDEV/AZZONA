<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #C9A96E;
  --gold-light: #E2C992;
  --gold-dim: rgba(201,169,110,0.15);
  --dark: #0A0A0A;
  --dark2: #111111;
  --dark3: #181818;
  --dark4: #1E1E1E;
  --border: rgba(201,169,110,0.12);
  --text: #8A8276;
  --cream: #E8E0D0;
  --red: #C0392B;
  --green: #27AE60;
  --amber: #E67E22;
}
html, body, #root { height: 100%; }
body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Syne', sans-serif;

  overflow: hidden;
}
input, select, textarea, button { font-family: 'Syne', sans-serif; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── DATA ─────────────────────────────────────────────────────
const CREDENTIALS = { user: 'admin', pass: 'azzona2026' };

const TODAY_RESERVATIONS = [
  { id:1, name:'Isabella M.', phone:'+258 84 *** 1234', time:'19:30', pax:4, area:'Main Dining', status:'Confirmed', vip:true, note:'Gluten Free' },

    { id:15, name:'Petra K.', time:'20:00', pax:6, area:'Lounge', status:'Confirmed', note:'' },
    { id:16, name:'Ahmed Al-Rashid', time:'19:00', pax:4, area:'Main Dining', status:'Pending', note:'' },

  ],

const DJS = [
  { id:1, name:'Black Coffee', genre:'Deep Afro House', date:'Sex 25 Abr', time:'22:00', status:'Published', img:null },
  { id:2, name:'Peggy Gou', genre:'Lounge / Tech House', date:'Sex 02 Mai', time:'22:00', status:'Draft', img:null },
  { id:3, name:'DJ Merlon', genre:'Soulful House', date:'Sex 09 Mai', time:'22:00', status:'Published', img:null },
];

// ── UTILS ─────────────────────────────────────────────────────
const statusColor = s => ({ Confirmed:'var(--green)', Arrived:'var(--gold)', Expected:'var(--text)', Pending:'var(--amber)', Published:'var(--green)', Draft:'var(--text)' }[s] || 'var(--text)');
const statusDot = s => <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:statusColor(s),marginRight:6}}></span>;

// ── LOGIN ─────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [attempts, setAttempts] = useState(0);

  const submit = e => {
    e.preventDefault();
    if (attempts >= 5) { setError('Conta bloqueada. Aguarde 15 minutos.'); return; }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (user === CREDENTIALS.user && pass === CREDENTIALS.pass) {
        onLogin();
      } else {
        setAttempts(a => a + 1);
        setError(`Credenciais inválidas. ${5 - attempts - 1} tentativa(s) restante(s).`);
        setPass('');
      }
    }, 900);
  };

  return (
    <div style={{minHeight:'100vh', background:'var(--dark)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden'}}>
      {/* Background texture */}
      <div style={{position:'absolute',inset:0, backgroundImage:'radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.03) 0%, transparent 50%)'}}></div>
      {/* Faint grid */}
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px)', backgroundSize:'60px 60px', opacity:0.5}}></div>

      <div style={{position:'relative', width:480, background:'rgba(17,17,17,0.95)', border:'1px solid var(--border)', padding:'56px 48px', backdropFilter:'blur(20px)'}}>
        {/* Logo */}
        <div style={{textAlign:'center', marginBottom:40}}>
          <svg width="32" height="32" viewBox="0 0 32 32" style={{marginBottom:16}}>
            <line x1="8" y1="8" x2="24" y2="24" stroke="var(--gold)" strokeWidth="2"/>
            <line x1="24" y1="8" x2="8" y2="24" stroke="var(--gold)" strokeWidth="2"/>
            <circle cx="16" cy="16" r="4" fill="none" stroke="var(--gold)" strokeWidth="1.5"/>
          </svg>
          <div style={{fontFamily:'Playfair Display, serif', fontSize:32, fontWeight:700, letterSpacing:8, color:'var(--gold)'}}>AZZONA</div>
          <div style={{fontSize:10, letterSpacing:5, color:'var(--text)', textTransform:'uppercase', marginTop:8}}>Management Portal</div>
        </div>

        <form onSubmit={submit}>
          <div style={{marginBottom:24}}>
            <label style={{fontSize:10, letterSpacing:3, textTransform:'uppercase', color:'var(--text)', display:'block', marginBottom:10}}>Administrator ID</label>
            <input value={user} onChange={e=>setUser(e.target.value)} placeholder="Enter credentials"
              style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid rgba(201,169,110,0.25)', padding:'10px 0', color:'var(--cream)', fontSize:15, outline:'none', transition:'border-color 0.3s'}}
              onFocus={e=>e.target.style.borderBottomColor='var(--gold)'} onBlur={e=>e.target.style.borderBottomColor='rgba(201,169,110,0.25)'}/>
          </div>
          <div style={{marginBottom:32, position:'relative'}}>
            <label style={{fontSize:10, letterSpacing:3, textTransform:'uppercase', color:'var(--text)', display:'block', marginBottom:10}}>Access Cipher</label>
            <input type={showPass ? 'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
              style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid rgba(201,169,110,0.25)', padding:'10px 0', paddingRight:32, color:'var(--cream)', fontSize:15, outline:'none', transition:'border-color 0.3s'}}
              onFocus={e=>e.target.style.borderBottomColor='var(--gold)'} onBlur={e=>e.target.style.borderBottomColor='rgba(201,169,110,0.25)'}/>
            <button type="button" onClick={()=>setShowPass(s=>!s)} style={{position:'absolute', right:0, bottom:10, background:'none', border:'none', color:'var(--text)', cursor:'pointer', fontSize:14}}>
              {showPass ? '🙈' : '👁'}
            </button>
          </div>

          {error && <div style={{marginBottom:20, padding:'10px 14px', background:'rgba(192,57,43,0.12)', border:'1px solid rgba(192,57,43,0.3)', fontSize:12, color:'#e74c3c', letterSpacing:1}}>{error}</div>}

          <button type="submit" disabled={loading} style={{width:'100%', background: loading ? 'rgba(201,169,110,0.5)' : 'var(--gold)', border:'none', color:'var(--dark)', padding:'16px', fontSize:11, letterSpacing:4, textTransform:'uppercase', fontWeight:700, cursor: loading ? 'wait':'pointer', transition:'all 0.3s', display:'flex', alignItems:'center', justifyContent:'center', gap:10}}>
            {loading ? <><Spinner/> Autenticando...</> : <>AUTHENTICATE →</>}
          </button>

          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:20}}>
            <label style={{display:'flex', alignItems:'center', gap:8, fontSize:12, color:'var(--text)', cursor:'pointer'}}>
              <input type="checkbox" style={{accentColor:'var(--gold)'}}/> Retain Session
            </label>
            <span style={{fontSize:12, color:'var(--gold)', cursor:'pointer', borderBottom:'1px solid rgba(201,169,110,0.3)'}}>Recover Access</span>
          </div>
        </form>

        <div style={{textAlign:'center', marginTop:40, fontSize:10, letterSpacing:3, color:'rgba(138,130,118,0.4)', textTransform:'uppercase'}}>
          © 2026 Azzona · Polana District · Secure Server
        </div>
      </div>
    </div>
  );
}

function Spinner() {
  return <svg width="14" height="14" viewBox="0 0 14 14" style={{animation:'spin 1s linear infinite'}}>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    <circle cx="7" cy="7" r="5" fill="none" stroke="var(--dark)" strokeWidth="2" strokeDasharray="20" strokeDashoffset="10"/>
  </svg>;
}

// ── SIDEBAR ───────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard', icon:'⊞' },
  { id:'reservations', label:'Reservas', icon:'◫' },
  { id:'djs', label:'DJ & Events', icon:'◉' },
  { id:'menu', label:'Menu Mgmt', icon:'✦' },
  { id:'financials', label:'Financials', icon:'◈' },
];

function Sidebar({ active, setActive, onLogout, haltDay, setHaltDay }) {
  return (
    <div style={{width:220, background:'var(--dark2)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', flexShrink:0, height:'100%'}}>
      <div style={{padding:'28px 24px 20px'}}>
        <div style={{fontFamily:'Playfair Display,serif', fontSize:18, fontWeight:700, letterSpacing:4, color:'var(--gold)'}}>AZZONA</div>
        <div style={{fontSize:9, letterSpacing:3, color:'var(--text)', textTransform:'uppercase', marginTop:4}}>Polana District Admin</div>
      </div>
      <div style={{borderTop:'1px solid var(--border)', margin:'0 16px'}}></div>
      <nav style={{padding:'16px 0', flex:1}}>
        {NAV.map(n => (
          <button key={n.id} onClick={()=>setActive(n.id)} style={{
            display:'flex', alignItems:'center', gap:12, width:'100%',
            padding:'13px 24px', background: active===n.id ? 'rgba(201,169,110,0.08)':'transparent',
            border:'none', borderLeft: active===n.id ? '2px solid var(--gold)':'2px solid transparent',
            color: active===n.id ? 'var(--gold)':'var(--text)', fontSize:11,
            letterSpacing:2, textTransform:'uppercase', cursor:'pointer',
            transition:'all 0.2s', textAlign:'left',
          }}>
            <span style={{fontSize:14, opacity: active===n.id ? 1:0.5}}>{n.icon}</span>
            {n.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'16px'}}>
        <button style={{width:'100%', padding:'12px', background:'var(--gold-dim)', border:'1px solid var(--border)', color:'var(--gold)', fontSize:10, letterSpacing:3, textTransform:'uppercase', cursor:'pointer', marginBottom:8, transition:'all 0.2s'}}
          onMouseEnter={e=>e.target.style.background='rgba(201,169,110,0.2)'}
          onMouseLeave={e=>e.target.style.background='var(--gold-dim)'}>
          ⚑ Support Concierge
        </button>
      </div>
      <div style={{borderTop:'1px solid var(--border)', padding:'12px 8px'}}>
        <button onClick={()=>setHaltDay(h=>!h)} style={{display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 16px', background:'transparent', border:'none', color:haltDay?'var(--red)':'var(--text)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>
          <span>{haltDay?'🔴':'⚙'}</span> System Settings
        </button>
        <button onClick={onLogout} style={{display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 16px', background:'transparent', border:'none', color:'var(--text)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>
          <span>↩</span> Logout
        </button>
      </div>
    </div>
  );
}

// ── TOPBAR ────────────────────────────────────────────────────
function Topbar({ title, haltDay, setHaltDay, absenceMsg, setShowAbsence }) {
  return (
    <div style={{height:56, background:'var(--dark2)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 32px', gap:16, flexShrink:0}}>

        <span style={{color:'var(--text)', fontSize:13}}>⌕</span>

      <div style={{flex:1, display:'flex', justifyContent:'flex-end', alignItems:'center', gap:20}}>
        {haltDay && <span style={{fontSize:10, letterSpacing:2, color:'var(--red)', textTransform:'uppercase', background:'rgba(192,57,43,0.1)', padding:'4px 10px', border:'1px solid rgba(192,57,43,0.3)'}}>◉ DIA FECHADO</span>}
        <span style={{color:'var(--text)', cursor:'pointer', fontSize:16}}>🔔</span>
        <span style={{color:'var(--text)', cursor:'pointer', fontSize:16}}>◑</span>
        <div style={{width:32, height:32, background:'var(--gold-dim)', border:'1px solid var(--border)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, color:'var(--gold)'}}>A</div>
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({ haltDay, setHaltDay, absenceMsg, setAbsenceMsg, showAbsence, setShowAbsence }) {
  const [reservations, setReservations] = useState(TODAY_RESERVATIONS);

  const total = reservations.length;
  const totalPax = reservations.reduce((s,r)=>s+r.pax,0);

  const confirm = id => setReservations(rs => rs.map(r => r.id===id ? {...r, status:'Confirmed'} : r));
  const cancel = id => setReservations(rs => rs.filter(r => r.id!==id));

  return (
    <div style={{padding:'36px 40px', overflowY:'auto', flex:1}}>
      {/* Header */}
      <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:36}}>
        <div>
          <div style={{fontSize:11, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:6}}>Quarta-Feira, 23 de Abril</div>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:40, fontWeight:400}}>Daily Overview</div>
        </div>
        <div style={{display:'flex', gap:12, marginTop:8}}>
          <button onClick={()=>setShowAbsence(s=>!s)} style={{padding:'10px 20px', background:'transparent', border:'1px solid var(--border)', color:'var(--cream)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:8}}>
            💬 Absence Message
          </button>
          <button onClick={()=>setHaltDay(h=>!h)} style={{padding:'10px 20px', background: haltDay ? 'rgba(192,57,43,0.2)' : 'var(--gold-dim)', border:`1px solid ${haltDay ? 'rgba(192,57,43,0.4)':'var(--border)'}`, color: haltDay ? 'var(--red)':'var(--gold)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer', display:'flex', alignItems:'center', gap:8}}>
            🔒 {haltDay ? 'Reopen Day':'Close Day'}
          </button>
        </div>
      </div>

      {/* Absence message panel */}
      {showAbsence && (
        <div style={{marginBottom:24, padding:'20px 24px', background:'var(--dark3)', border:'1px solid var(--border)'}}>
          <div style={{fontSize:10, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:10}}>Mensagem de Ausência (aparece no site público)</div>
          <textarea value={absenceMsg} onChange={e=>setAbsenceMsg(e.target.value)} rows={2}
            style={{width:'100%', background:'transparent', border:'1px solid var(--border)', color:'var(--cream)', padding:'10px', fontSize:14, resize:'none', outline:'none'}}
            placeholder="Ex: Hoje estamos com evento privado. Aceitamos reservas apenas para amanhã."/>
          <button onClick={()=>setShowAbsence(false)} style={{marginTop:10, padding:'8px 20px', background:'var(--gold)', border:'none', color:'var(--dark)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>Publicar</button>
        </div>
      )}

      {/* KPI Cards */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16, marginBottom:36}}>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'28px 28px 24px'}}>
          <div style={{fontSize:11, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:16}}>Reservas para Hoje</div>
          <div style={{display:'flex', alignItems:'flex-end', gap:14}}>
            <div style={{fontFamily:'Playfair Display,serif', fontSize:60, fontWeight:400, lineHeight:1, color:'var(--cream)'}}>{total}</div>
            <span style={{marginBottom:10, padding:'3px 10px', background:'var(--gold-dim)', fontSize:10, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase'}}>3 Walk-ins</span>
          </div>
        </div>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'28px 28px 24px'}}>
          <div style={{fontSize:11, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:16}}>Total de Pessoas Esperadas</div>
          <div style={{display:'flex', alignItems:'flex-end', gap:12}}>
            <div style={{fontFamily:'Playfair Display,serif', fontSize:60, fontWeight:400, lineHeight:1, color:'var(--cream)'}}>{totalPax}</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11, color:'var(--text)'}}>Capacidade:</div>
              <div style={{fontSize:20, color:'var(--gold)'}}>65</div>
            </div>
          </div>
        </div>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:0, overflow:'hidden', position:'relative'}}>
          <img src="uploads/467157185_18289906990234146_9164660595181843240_n.jpg" style={{width:'100%', height:'100%', objectFit:'cover', opacity:0.4}} alt="venue"/>
          <div style={{position:'absolute', bottom:0, left:0, right:0, padding:'16px 20px', background:'linear-gradient(to top, rgba(10,10,10,0.9), transparent)'}}>
            <div style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase'}}>Evening Service Prep</div>
            <div style={{fontFamily:'Playfair Display,serif', fontSize:18, marginTop:4}}>Lounge Area Active</div>
          </div>
        </div>
      </div>

      {/* Today's Roster */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
        <div style={{fontFamily:'Playfair Display,serif', fontSize:28, fontWeight:400}}>Today's Roster</div>
        <span style={{fontSize:10, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', cursor:'pointer'}}>Filter ⚌</span>
      </div>
      <div style={{background:'var(--dark3)', border:'1px solid var(--border)', overflow:'hidden'}}>
        <div style={{display:'grid', gridTemplateColumns:'2fr 1.5fr 1.5fr 1fr 1.2fr', padding:'12px 24px', borderBottom:'1px solid var(--border)'}}>
          {['Guest Name','Contact','Time / Details','Status','Actions'].map(h=>(
            <div key={h} style={{fontSize:9, letterSpacing:2, color:'var(--text)', textTransform:'uppercase'}}>{h}</div>
          ))}
        </div>
        {reservations.map((r,i)=>(
          <div key={r.id} style={{display:'grid', gridTemplateColumns:'2fr 1.5fr 1.5fr 1fr 1.2fr', padding:'18px 24px', borderBottom: i<reservations.length-1 ? '1px solid rgba(201,169,110,0.06)' : 'none', alignItems:'center', transition:'background 0.2s'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(201,169,110,0.03)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <span style={{fontSize:14}}>{r.name}</span>
                {r.vip && <span style={{padding:'2px 8px', background:'var(--gold-dim)', border:'1px solid rgba(201,169,110,0.3)', fontSize:8, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase'}}>★ VIP</span>}
              </div>
              {r.note && <div style={{fontSize:11, color:'var(--text)', marginTop:3}}>{r.note}</div>}
            </div>
            <div style={{fontSize:13, color:'var(--text)'}}>{r.phone}</div>
            <div>
              <div style={{fontSize:16, color:'var(--gold)', fontWeight:600}}>{r.time}</div>
              <div style={{fontSize:11, color:'var(--text)'}}>{r.area} · {r.pax} pax</div>
            </div>
            <div style={{display:'flex', alignItems:'center', fontSize:12}}>
              {statusDot(r.status)}{r.status}
            </div>
            <div style={{display:'flex', gap:8}}>
              {r.status==='Pending' && (
                <button onClick={()=>confirm(r.id)} style={{padding:'5px 12px', background:'rgba(39,174,96,0.1)', border:'1px solid rgba(39,174,96,0.3)', color:'var(--green)', fontSize:10, letterSpacing:1, cursor:'pointer'}}>✓ Confirm</button>
              )}
              <button onClick={()=>cancel(r.id)} style={{padding:'5px 12px', background:'rgba(192,57,43,0.1)', border:'1px solid rgba(192,57,43,0.3)', color:'var(--red)', fontSize:10, letterSpacing:1, cursor:'pointer'}}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── RESERVATIONS ──────────────────────────────────────────────
function Reservations() {
  const days = Object.keys(WEEKLY_RESERVATIONS);
  const [activeDay, setActiveDay] = useState('Qua 23');
  const [data, setData] = useState(WEEKLY_RESERVATIONS);
  const [filter, setFilter] = useState('all');
  const [viewMode, setViewMode] = useState('weekly');

  const dayRes = (data[activeDay] || []).filter(r => filter==='all' || r.status.toLowerCase()===filter);
  const confirm = (day, id) => setData(d => ({...d, [day]: d[day].map(r => r.id===id ? {...r, status:'Confirmed'} : r)}));
  const cancel = (day, id) => setData(d => ({...d, [day]: d[day].filter(r => r.id!==id)}));

  return (
    <div style={{padding:'36px 40px', overflowY:'auto', flex:1}}>
      <div style={{display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:32}}>
        <div>
          <div style={{fontSize:11, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:6}}>Schedule Management</div>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:40}}>Reservations</div>
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {['weekly','monthly'].map(m=>(
            <button key={m} onClick={()=>setViewMode(m)} style={{padding:'8px 18px', background:viewMode===m?'var(--gold)':'transparent', border:'1px solid var(--border)', color:viewMode===m?'var(--dark)':'var(--text)', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer'}}>{m==='weekly'?'Semanal':'Mensal'}</button>
          ))}
          <span style={{color:'var(--text)', padding:'0 8px', cursor:'pointer', fontSize:18}}>‹</span>
          <span style={{fontSize:12, letterSpacing:2, color:'var(--cream)', minWidth:130, textAlign:'center'}}>23 – 29 Abr 2026</span>
          <span style={{color:'var(--text)', padding:'0 8px', cursor:'pointer', fontSize:18}}>›</span>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 300px', gap:24}}>
        {/* Main calendar */}
        <div>
          {/* Day tabs */}
          <div style={{display:'flex', gap:0, marginBottom:24, overflowX:'auto'}}>
            {days.map(d => (
              <button key={d} onClick={()=>setActiveDay(d)} style={{padding:'12px 20px', background:'transparent', border:'1px solid var(--border)', borderLeft: days.indexOf(d)>0 ? 'none':'1px solid var(--border)', color: activeDay===d?'var(--gold)':'var(--text)', fontSize:11, letterSpacing:2, textTransform:'uppercase', cursor:'pointer', minWidth:90, position:'relative'}}>
                {d}
                {activeDay===d && <div style={{position:'absolute', bottom:0, left:0, right:0, height:2, background:'var(--gold)'}}></div>}
              </button>
            ))}
          </div>

          {/* Time slots */}
          {dayRes.length === 0 && (
            <div style={{padding:'60px', textAlign:'center', color:'var(--text)', fontSize:14, border:'1px solid var(--border)', letterSpacing:2}}>Sem reservas para este dia</div>
          )}
          {dayRes.map(r => (
            <div key={r.id} style={{background:'var(--dark3)', border:`1px solid ${r.status==='Pending'?'rgba(230,126,34,0.3)':'var(--border)'}`, padding:'24px', marginBottom:16, position:'relative'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                <div>
                  <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:8}}>
                    <span style={{fontSize:11, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase'}}>{r.time}</span>
                    <span style={{padding:'3px 10px', background: r.status==='Pending'?'rgba(230,126,34,0.1)':'rgba(39,174,96,0.1)', border:`1px solid ${r.status==='Pending'?'rgba(230,126,34,0.3)':'rgba(39,174,96,0.3)'}`, fontSize:9, letterSpacing:2, color: r.status==='Pending'?'var(--amber)':'var(--green)', textTransform:'uppercase'}}>● {r.status}</span>
                  </div>
                  <div style={{fontFamily:'Playfair Display,serif', fontSize:22, marginBottom:4}}>{r.name}</div>
                  <div style={{fontSize:12, color:'var(--text)'}}>{r.area} · {r.pax} Guests</div>
                  {r.note && <div style={{marginTop:8, fontSize:12, color:'var(--text)', fontStyle:'italic', borderLeft:'2px solid var(--gold-dim)', paddingLeft:10}}>{r.note}</div>}
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:8, marginTop:4}}>
                  {r.status==='Pending' && <button onClick={()=>confirm(activeDay,r.id)} style={{padding:'8px 20px', background:'transparent', border:'1px solid rgba(39,174,96,0.4)', color:'var(--green)', fontSize:10, letterSpacing:2, cursor:'pointer'}}>✓ Confirm</button>}
                  <button onClick={()=>cancel(activeDay,r.id)} style={{padding:'8px 20px', background:'transparent', border:'1px solid rgba(201,169,110,0.2)', color:'var(--text)', fontSize:10, letterSpacing:2, cursor:'pointer'}}>✕ Cancel</button>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Sidebar panel */}
        <div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16}}>
            <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'20px', textAlign:'center'}}>
              <div style={{fontSize:36, color:'var(--cream)', fontFamily:'Playfair Display,serif'}}>{(data[activeDay]||[]).reduce((s,r)=>s+r.pax,0)}</div>
              <div style={{fontSize:9, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginTop:4}}>Tonight's Covers</div>
            </div>
            <div style={{background:'var(--dark3)', border:'1px solid rgba(201,169,110,0.3)', padding:'20px', textAlign:'center'}}>
              <div style={{fontSize:36, color:'var(--gold)', fontFamily:'Playfair Display,serif'}}>{(data[activeDay]||[]).filter(r=>r.status==='Pending').length}</div>
              <div style={{fontSize:9, letterSpacing:2, color:'var(--gold)', textTransform:'uppercase', marginTop:4}}>Pending Action</div>
            </div>
          </div>

          {/* Filters */}
          <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'20px', marginBottom:16}}>
            <div style={{fontSize:11, letterSpacing:2, color:'var(--cream)', textTransform:'uppercase', marginBottom:16}}>⚌ View Filters</div>
            <div style={{fontSize:10, letterSpacing:2, color:'var(--text)', textTransform:'uppercase', marginBottom:10}}>Reservation Status</div>
            {['all','confirmed','pending'].map(f=>(
              <label key={f} style={{display:'flex', alignItems:'center', gap:10, marginBottom:10, cursor:'pointer', fontSize:13, color: filter===f?'var(--cream)':'var(--text)'}}>
                <input type="radio" name="filter" checked={filter===f} onChange={()=>setFilter(f)} style={{accentColor:'var(--gold)'}}/> {f==='all'?'All Reservations':f==='confirmed'?'Confirmed Only':'Pending Only'}
              </label>
            ))}
          </div>

          {/* Venue photo */}
          <div style={{overflow:'hidden', position:'relative', height:160}}>
            <img src="uploads/484471297_1258320312672407_7533519604146987578_n.jpg" style={{width:'100%', height:'100%', objectFit:'cover', opacity:0.5}}/>
            <div style={{position:'absolute', bottom:0, left:0, right:0, padding:'12px 16px', background:'linear-gradient(to top, rgba(10,10,10,0.9), transparent)'}}>
              <div style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase'}}>Evening Shift Prep</div>
              <div style={{fontFamily:'Playfair Display,serif', fontSize:14, marginTop:2}}>Review Lounge Allocations</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── DJ MANAGEMENT ─────────────────────────────────────────────
function DJManager() {
  const [djs, setDjs] = useState(DJS);
  const [form, setForm] = useState({ name:'', genre:'', date:'', time:'22:00' });
  const [imgPreview, setImgPreview] = useState(null);
  const [saved, setSaved] = useState(false);
  const [haltRes, setHaltRes] = useState(false);
  const [highCap, setHighCap] = useState(true);
  const fileRef = useRef();

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert('Max 5MB'); return; }
    const reader = new FileReader();
    reader.onload = ev => setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const schedule = () => {
    if (!form.name || !form.date) return;
    const newDJ = { id: Date.now(), ...form, status:'Draft', img: imgPreview };
    setDjs(d => [newDJ, ...d]);
    setForm({ name:'', genre:'', date:'', time:'22:00' });
    setImgPreview(null);
    setSaved(true);
    setTimeout(()=>setSaved(false), 3000);
  };

  const publish = id => setDjs(d => d.map(dj => dj.id===id ? {...dj, status:'Published'} : dj));
  const remove = id => setDjs(d => d.filter(dj => dj.id!==id));

  return (
    <div style={{padding:'36px 40px', overflowY:'auto', flex:1}}>
      <div style={{marginBottom:32}}>
        <div style={{fontSize:11, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:6}}>Gestão de Noites</div>
        <div style={{fontFamily:'Playfair Display,serif', fontSize:40}}>DJ & Events</div>
        <div style={{fontSize:15, color:'var(--text)', marginTop:8, fontFamily:'Cormorant Garamond,serif', fontStyle:'italic'}}>Curate the atmospheric soundscape. Upload promotional imagery and schedule talent for the upcoming season.</div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 320px', gap:24}}>
        {/* Form */}
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'32px'}}>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:22, marginBottom:28}}>Event Configuration</div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20}}>
            <div>
              <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:8}}>DJ / Artist Name</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Black Coffee"
                style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid var(--border)', padding:'10px 0', color:'var(--cream)', fontSize:14, outline:'none'}}/>
            </div>
            <div>
              <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:8}}>Event Date</label>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid var(--border)', padding:'10px 0', color:'var(--cream)', fontSize:14, outline:'none', colorScheme:'dark'}}/>
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:8}}>Atmosphere / Genre</label>
            <input value={form.genre} onChange={e=>setForm(f=>({...f,genre:e.target.value}))} placeholder="e.g. Deep Afro House"
              style={{width:'100%', background:'transparent', border:'none', borderBottom:'1px solid var(--border)', padding:'10px 0', color:'var(--cream)', fontSize:14, outline:'none'}}/>
          </div>

          <div style={{marginBottom:24}}>
            <label style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', display:'block', marginBottom:12}}>Promotional Imagery</label>
            <div onClick={()=>fileRef.current.click()} style={{border:'1px dashed rgba(201,169,110,0.3)', padding:'40px 24px', textAlign:'center', cursor:'pointer', transition:'border-color 0.3s', background: imgPreview?'none':'rgba(201,169,110,0.02)'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--gold)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(201,169,110,0.3)'}>
              {imgPreview
                ? <img src={imgPreview} style={{maxHeight:160, maxWidth:'100%', objectFit:'contain'}}/>
                : <>
                    <div style={{fontSize:28, marginBottom:12, color:'var(--gold)', opacity:0.5}}>↑</div>
                    <div style={{fontSize:13}}><span style={{color:'var(--gold)', cursor:'pointer'}}>Click to upload</span> or drag and drop</div>
                    <div style={{fontSize:11, color:'var(--text)', marginTop:6}}>High-res PNG, JPG (Max 5MB)</div>
                  </>}
            </div>
            <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/jpg" onChange={handleFile} style={{display:'none'}}/>
            <div style={{marginTop:10, fontSize:11, color:'var(--text)', padding:'8px 12px', background:'rgba(201,169,110,0.04)', border:'1px solid var(--border)', display:'flex', gap:8, alignItems:'flex-start'}}>
              <span style={{color:'var(--gold)'}}>🔒</span>
              <span>Security Protocol: Uploaded files are automatically renamed via UUID (e.g., <span style={{color:'var(--gold)', fontFamily:'monospace'}}>a1b2c3-uuid.jpg</span>) to prevent path traversal. Do not upload sensitive personal data.</span>
            </div>
          </div>

          {saved && <div style={{marginBottom:16, padding:'10px 14px', background:'rgba(39,174,96,0.1)', border:'1px solid rgba(39,174,96,0.3)', fontSize:12, color:'var(--green)', letterSpacing:1}}>✓ DJ agendado com sucesso</div>}

          <button onClick={schedule} style={{padding:'14px 36px', background:'transparent', border:'1px solid var(--gold)', color:'var(--gold)', fontSize:11, letterSpacing:3, textTransform:'uppercase', cursor:'pointer', transition:'all 0.3s'}}
            onMouseEnter={e=>{e.target.style.background='var(--gold)';e.target.style.color='var(--dark)'}}
            onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color='var(--gold)'}}>
            Schedule Event
          </button>
        </div>

        {/* Preview + Quick Actions */}
        <div>
          {/* Public preview */}
          <div style={{background:'var(--dark3)', border:'1px solid var(--border)', marginBottom:16, overflow:'hidden'}}>
            <div style={{padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
              <span style={{fontSize:10, letterSpacing:2, textTransform:'uppercase', color:'var(--text)'}}>Public Site Preview</span>
              <span style={{color:'var(--gold)', fontSize:14}}>◉</span>
            </div>
            {djs[0] && (
              <div style={{position:'relative', height:220, overflow:'hidden'}}>
                {djs[0].img
                  ? <img src={djs[0].img} style={{width:'100%', height:'100%', objectFit:'cover', opacity:0.6}}/>
                  : <div style={{background:'linear-gradient(135deg, #1a1a1a, #0a0a0a)', height:'100%', display:'flex', alignItems:'center', justifyContent:'center'}}>
                      <div style={{width:80, height:80, borderRadius:'50%', background:'var(--gold-dim)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, color:'var(--gold)'}}>◎</div>
                    </div>}
                <div style={{position:'absolute', bottom:0, left:0, right:0, padding:'20px', background:'linear-gradient(to top, rgba(10,10,10,0.95), transparent)'}}>
                  <div style={{fontSize:9, letterSpacing:3, color:'var(--gold)', textTransform:'uppercase', marginBottom:4}}>{djs[0].date} · {djs[0].time || '22:00'}</div>
                  <div style={{fontFamily:'Playfair Display,serif', fontSize:28, lineHeight:1.1}}>{djs[0].name}</div>
                  <div style={{fontSize:11, color:'var(--text)', marginTop:4}}>{djs[0].genre} Lounge Session</div>
                </div>
              </div>
            )}
          </div>

          {/* Quick Actions */}
          <div style={{background:'var(--dark3)', border:'1px solid var(--border)', padding:'20px'}}>
            <div style={{fontSize:11, letterSpacing:2, color:'var(--cream)', textTransform:'uppercase', marginBottom:16}}>⚡ Quick Actions</div>
            {[
              { label:'Halt New Reservations', state:haltRes, set:setHaltRes },
              { label:'Set High-Capacity Alert', state:highCap, set:setHighCap },
            ].map(({label,state,set})=>(
              <div key={label} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 0', borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:12, color:state?'var(--cream)':'var(--text)'}}>{label}</span>
                <div onClick={()=>set(s=>!s)} style={{width:40, height:22, background: state?'var(--gold)':'rgba(255,255,255,0.1)', borderRadius:11, position:'relative', cursor:'pointer', transition:'background 0.3s'}}>
                  <div style={{width:16, height:16, background:'white', borderRadius:'50%', position:'absolute', top:3, left: state?21:3, transition:'left 0.3s'}}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Scheduled Talent */}
      <div style={{marginTop:40}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
          <div style={{fontFamily:'Playfair Display,serif', fontSize:28}}>Scheduled Talent</div>
          <span style={{fontSize:11, color:'var(--gold)', letterSpacing:2, cursor:'pointer'}}>View Archive</span>
        </div>
        <div style={{background:'var(--dark3)', border:'1px solid var(--border)', overflow:'hidden'}}>
          <div style={{display:'grid', gridTemplateColumns:'100px 1fr 1fr 1fr 140px', padding:'12px 24px', borderBottom:'1px solid var(--border)'}}>
            {['Data','DJ / Artist','Género','Status',''].map(h=>(
              <div key={h} style={{fontSize:9, letterSpacing:2, color:'var(--text)', textTransform:'uppercase'}}>{h}</div>
            ))}
          </div>
          {djs.map((dj,i)=>(
            <div key={dj.id} style={{display:'grid', gridTemplateColumns:'100px 1fr 1fr 1fr 140px', padding:'18px 24px', borderBottom: i<djs.length-1?'1px solid rgba(201,169,110,0.05)':'none', alignItems:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(201,169,110,0.03)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{fontSize:11, letterSpacing:1, color:'var(--gold)', textTransform:'uppercase'}}>{dj.date}</div>
              <div style={{fontFamily:'Playfair Display,serif', fontSize:17}}>{dj.name}</div>
              <div style={{fontSize:12, color:'var(--text)'}}>{dj.genre}</div>
              <div style={{display:'flex', alignItems:'center', fontSize:12}}>
                {statusDot(dj.status)}{dj.status}
              </div>
              <div style={{display:'flex', gap:8}}>
                {dj.status==='Draft' && <button onClick={()=>publish(dj.id)} style={{padding:'5px 12px', background:'rgba(39,174,96,0.1)', border:'1px solid rgba(39,174,96,0.3)', color:'var(--green)', fontSize:9, letterSpacing:1, cursor:'pointer'}}>Publish</button>}
                <button onClick={()=>remove(dj.id)} style={{padding:'5px 12px', background:'transparent', border:'1px solid var(--border)', color:'var(--text)', fontSize:9, letterSpacing:1, cursor:'pointer'}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── PLACEHOLDER SCREENS ───────────────────────────────────────
function Placeholder({ title, icon }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:20, color:'var(--text)'}}>
      <div style={{fontSize:48, opacity:0.2}}>{icon}</div>
      <div style={{fontFamily:'Playfair Display,serif', fontSize:32, color:'var(--cream)', opacity:0.3}}>{title}</div>
      <div style={{fontSize:11, letterSpacing:3, textTransform:'uppercase', opacity:0.3}}>Em Desenvolvimento</div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('azzona_auth') === '1');
  const [screen, setScreen] = useState('dashboard');
  const [haltDay, setHaltDay] = useState(false);
  const [absenceMsg, setAbsenceMsg] = useState('');
  const [showAbsence, setShowAbsence] = useState(false);

  const login = () => { sessionStorage.setItem('azzona_auth','1'); setAuthed(true); };
  const logout = () => { sessionStorage.removeItem('azzona_auth'); setAuthed(false); };

  const screenTitles = { dashboard:'Management Portal', reservations:'Reservations', djs:'DJ & Events', menu:'Menu Management', financials:'Financials' };

  if (!authed) return <Login onLogin={login}/>;

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      <Sidebar active={screen} setActive={setScreen} onLogout={logout} haltDay={haltDay} setHaltDay={setHaltDay}/>
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <Topbar title={screenTitles[screen]} haltDay={haltDay} setHaltDay={setHaltDay} absenceMsg={absenceMsg} setShowAbsence={setShowAbsence}/>
        <div style={{flex:1, overflowY:'auto', background:'var(--dark)'}}>
          {screen==='dashboard' && <Dashboard haltDay={haltDay} setHaltDay={setHaltDay} absenceMsg={absenceMsg} setAbsenceMsg={setAbsenceMsg} showAbsence={showAbsence} setShowAbsence={setShowAbsence}/>}
          {screen==='reservations' && <Reservations/>}
          {screen==='djs' && <DJManager/>}
          {screen==='menu' && <Placeholder title="Menu Management" icon="✦"/>}
          {screen==='financials' && <Placeholder title="Financials" icon="◈"/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
