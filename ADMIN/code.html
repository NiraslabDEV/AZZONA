<body class="bg-background min-h-screen relative flex items-center justify-center overflow-hidden font-body-md text-on-background selection:bg-primary selection:text-on-primary">
<!-- Atmospheric Background with Overlay -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute inset-0 bg-background/85 backdrop-blur-[2px] z-10"></div>
<img alt="" class="w-full h-full object-cover z-0 opacity-40" data-alt="Dark, atmospheric interior of a luxury lounge bar in Maputo. Deep shadows, warm ambient gold lighting reflecting off polished dark wood and glass surfaces, conveying high-end exclusivity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkx2i4yzXQAwn6lF_D9Zk2hnToqFMwEmYuAp0QsnUzldeIzllsonoByOl8HUoTGp_pp8Iz8eHIUnzZ46_MJTgblKObup4xxHUCa9mq0gaOcgISrEJfeBxTGxW95Bq6ViRLBq8qsRYgwVkmCaixq9BZkKVwBI7DzG7cbB-fmR2I3nvPrQin4bN3Q_f0YENAU30zzr_IT7UDQpqEvgx18s7gWk0QJLREXfInP1XchCniOSRaEFMNp6NIsA6hPcCAbcc2TZtpnkFjOZEZ"/>
</div>
<!-- Login Container -->
<main class="relative z-20 w-full max-w-[460px] mx-margin-mobile md:mx-auto">
<!-- Glassmorphism Card -->
<div class="bg-surface-container/40 backdrop-blur-3xl rounded-xl border border-primary/15 px-8 py-12 md:px-12 md:py-16 shadow-[0_0_50px_rgba(212,175,55,0.05)] flex flex-col gap-12">
<!-- Brand Identity -->
<div class="text-center flex flex-col items-center gap-4">
<span class="material-symbols-outlined text-primary text-4xl mb-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
<h1 class="font-display-xl text-display-xl text-primary tracking-widest uppercase">AZZONA</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-[0.3em]">Management Portal</p>
</div>
<!-- Authentication Form -->
<form class="flex flex-col gap-8">
<!-- ID Input -->
<div class="flex flex-col gap-2 group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider group-focus-within:text-primary transition-colors duration-300">Administrator ID</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant text-on-surface font-body-lg text-body-lg focus:ring-0 focus:border-primary transition-colors duration-300 py-3 px-0 placeholder:text-surface-variant" placeholder="Enter credentials" type="text"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2 group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider group-focus-within:text-primary transition-colors duration-300">Access Cipher</label>
<div class="relative flex items-center">
<input class="w-full bg-transparent border-0 border-b border-outline-variant text-on-surface font-body-lg text-body-lg focus:ring-0 focus:border-primary transition-colors duration-300 py-3 px-0 pr-10 placeholder:text-surface-variant" placeholder="••••••••" type="password"/>
<button class="absolute right-0 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Auxiliary Actions -->
<div class="flex justify-between items-center mt-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 border border-outline-variant rounded-sm peer-checked:bg-primary peer-checked:border-primary transition-colors duration-200"></div>
<span class="material-symbols-outlined absolute text-[12px] text-on-primary opacity-0 peer-checked:opacity-100 pointer-events-none" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Retain Session</span>
</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors underline decoration-primary/30 underline-offset-4" href="#">Recover Access</a>
</div>
<!-- Submit Button -->
<button class="mt-6 w-full py-4 bg-surface-container-highest/50 border border-primary text-primary font-label-caps text-label-caps uppercase tracking-[0.2em] hover:bg-primary/[0.08] hover:shadow-[0_0_20px_rgba(212,175,55,0.15)] active:scale-[0.98] transition-all duration-300 rounded flex items-center justify-center gap-3" type="button">
                    Authenticate
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
</main>
<!-- Minimalist Footer -->
<footer class="absolute bottom-8 left-0 w-full text-center z-20">
<p class="font-label-caps text-label-caps text-on-surface-variant/40 tracking-widest uppercase">
            © 2024 AZZONA. Polana District. Secure Server.
        </p>
</footer>
